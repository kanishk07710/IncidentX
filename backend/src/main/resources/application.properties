spring.application.name=incidentx-api

# Server Configuration
server.port=${PORT:8080}
# Trust X-Forwarded-* headers from the platform's reverse proxy (Railway/Render/Fly.io/etc.)
# so Spring builds https:// URLs (OAuth2 redirect-uri, defaultSuccessUrl) even though the
# app itself only sees plain http from the proxy.
server.forward-headers-strategy=framework

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/incidentx}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Explicit dialect so Hibernate never needs to auto-detect it via JDBC connection metadata at
# startup. That auto-detection queries the connection's DatabaseMetaData, which a transaction-mode
# pooler (e.g. Supabase's Supavisor/PgBouncer pooler, used in production) doesn't expose the same
# way a direct connection does — without this, the app fails to start against a pooled connection
# with "Unable to determine Dialect without JDBC metadata".
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OAuth2 Configuration (OAuth is optional/placeholder for dev ease)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:mock-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:mock-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend origin(s). CORS_ALLOWED_ORIGINS is comma-separated so local dev and a deployed
# domain (e.g. your Vercel URL) can both be allowed at once. FRONTEND_URL is where the
# OAuth2 login flow redirects back to after success.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Session cookie cross-site settings — required when the frontend (Vercel) and backend
# (Railway/Render/Fly.io/etc.) are on different domains, since browsers only send
# cross-site cookies when SameSite=None, which itself requires Secure (HTTPS).
# Set SESSION_COOKIE_SAME_SITE=None and SESSION_COOKIE_SECURE=true in production;
# defaults below are correct for local http dev.
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# File storage / sandbox paths — defaults to the OS temp dir so this works unmodified on
# both Windows dev machines and Linux hosts.
incidentx.sandbox.temp-dir=${SANDBOX_TEMP_DIR:${java.io.tmpdir}/incidentx}
incidentx.sandbox.image-name=incidentx-sandbox-node
incidentx.sandbox.timeout-seconds=${SANDBOX_TIMEOUT_SECONDS:8}
# "docker" for local dev (docker-compose has a real daemon), "node" for hosts like Render's
# standard web service that don't expose a Docker daemon to the app container (submissions run
# directly via the Node binary baked into this image — see the API Dockerfile), or "auto"
# (default) to probe for a usable Docker CLI + sandbox image on first submission and fall back
# to node mode when either is missing. Auto exists so a deployment that forgets to set
# SANDBOX_MODE can never fail every submission with "Cannot run program docker".
incidentx.sandbox.mode=${SANDBOX_MODE:auto}

# AI mentor feedback (optional). Leave unset to use built-in mock feedback.
ai.api-key=${AI_API_KEY:mock}
ai.model=${AI_MODEL:gpt-4o-mini}
